<section class="stem-output-router" data-stem-output-router-root>
  <header class="stem-output-router__header">
    <div>
      <h2>Stem Output Router</h2>
      <p data-stem-output-router-summary>Scanning audio outputs...</p>
    </div>
    <div class="stem-output-router__actions">
      <button type="button" data-action="apply-routing">Apply Routing</button>
      <button type="button" data-action="release-routing">Restore Info</button>
      <button type="button" data-action="refresh">Refresh</button>
    </div>
  </header>

  <div class="stem-output-router__status" data-stem-output-router-status></div>

  <div class="stem-output-router__section">
    <h3>Stem Routes</h3>
    <div class="stem-output-router__list" data-stem-output-router-route-list></div>
  </div>

  <div class="stem-output-router__section">
    <h3>Playback Channels</h3>
    <div class="stem-output-router__list" data-stem-output-router-channel-list></div>
  </div>

  <div class="stem-output-router__section">
    <h3>Browser Output Diagnostics</h3>
    <div class="stem-output-router__actions">
      <button type="button" data-action="choose-output">Choose Browser Output</button>
      <button type="button" data-action="request-labels">Unlock Labels</button>
    </div>
    <div class="stem-output-router__list" data-stem-output-router-browser-list></div>
  </div>
</section>
